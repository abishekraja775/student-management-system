# ============================================
# Student Management System - Configuration
# ============================================

# ---- PostgreSQL Database Configuration ----
spring.datasource.url=jdbc:postgresql://localhost:5432/studentdb
spring.datasource.username=postgres
spring.datasource.password=2004

# ---- JPA / Hibernate Configuration ----
# "update" automatically creates/updates tables based on entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true

# Format SQL output for better readability
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Server Configuration ----
server.port=8080

# ---- Swagger / OpenAPI Configuration ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Application Name ----
spring.application.name=student-management-system
